<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Walink Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }

    .qr-card {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
      background: #fff;
    }

    #qrcode {
      width: 256px;
      height: 256px;
      margin: 0 auto 12px;
      display: grid;
      place-items: center;
      background: #fafafa;
      border-radius: 8px;
    }

    #downloadQrBtn[disabled] {
      opacity: .6;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="layout">
    <section>
      <!-- Tu formulario actual -->
      <form id="linkForm">
        <label>Teléfono</label>
        <input id="phone" type="text" placeholder="54911..." required />

        <label>Mensaje</label>
        <textarea id="message" placeholder="Hola..."></textarea>

        <button type="submit">Generar enlace</button>
      </form>

      <p>
        Enlace generado:
        <a id="generatedLink" href="#" target="_blank" rel="noopener noreferrer"></a>
      </p>
    </section>

    <aside class="qr-card">
      <h3>QR del enlace</h3>
      <div id="qrcode" aria-live="polite">Genera un enlace para ver el QR</div>
      <button id="downloadQrBtn" type="button" disabled>Descargar PNG</button>
    </aside>
  </div>

  <!-- Librería QR -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <!-- Tu JS separado -->
  <script src="./app.js"></script>
</body>
</html>
