<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Open Source de Links de WhatsApp</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-6 rounded-2xl shadow-xl max-w-5xl w-full">
        <h1 class="text-2xl font-bold text-green-600 mb-2 flex items-center gap-2">
            <span>💬</span> Generador de Links WA
        </h1>
        <p class="text-gray-500 text-sm mb-6">Genera enlaces nativos "wa.me" de forma local y 100% privada.</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
            <section>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Número de Teléfono (Con código de país, solo números)</label>
                        <input type="text" id="phone" placeholder="Ej: 34600123456" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                        <small class="text-gray-400 block mt-1">No incluyas el signo "+", espacios ni guiones.</small>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Mensaje Predefinido (Opcional)</label>
                        <textarea id="message" rows="3" placeholder="Ej: Hola, me interesa más información..." class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"></textarea>
                    </div>

                    <button id="generateBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200 cursor-pointer">
                        Generar Enlace Nativo
                    </button>
                </div>

                <div id="result-box" class="mt-6 pt-6 border-t border-gray-200 hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tu enlace wa.me:</label>
                    <div class="flex gap-2">
                        <input type="text" id="result-url" readonly class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm text-gray-600 select-all focus:outline-none">
                        <button id="copyBtn" class="bg-gray-800 hover:bg-gray-900 text-white text-sm font-medium px-4 py-2 rounded-lg transition duration-200 cursor-pointer">
                            Copiar
                        </button>
                    </div>
                    <div class="mt-4 flex gap-2">
                        <a id="btn-test" href="#" target="_blank" class="w-full text-center bg-blue-500 hover:bg-blue-600 text-white text-sm font-semibold py-2 px-4 rounded-lg transition duration-200">
                            Probar Enlace 🚀
                        </a>
                    </div>
                </div>
            </section>

            <aside class="border border-gray-200 rounded-xl p-4 bg-white">
                <h3 class="text-lg font-semibold text-gray-800 mb-3">QR del enlace</h3>
                <div id="qrcode" class="w-64 h-64 mx-auto mb-3 grid place-items-center bg-gray-50 rounded-lg text-sm text-gray-500" aria-live="polite">
                    Genera un enlace para ver el QR
                </div>
                <button id="downloadQrBtn" type="button" disabled class="w-full bg-gray-800 hover:bg-gray-900 disabled:bg-gray-400 text-white text-sm font-medium px-4 py-2 rounded-lg transition duration-200 cursor-pointer disabled:cursor-not-allowed">
                    Descargar PNG
                </button>
            </aside>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script src="./app.js"></script>
</body>
</html>
